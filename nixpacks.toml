# Nixpacks build config for Railway (Laravel 13 / PHP 8.3)
providers = ["php"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
]

# Run migrations, then start the Laravel server on Railway's $PORT.
# PHP_CLI_SERVER_WORKERS lets the built-in server handle concurrent connections — required so a
# held SSE spectator stream does not block other requests. Railway may override the count.
[start]
cmd = "php artisan migrate --force && PHP_CLI_SERVER_WORKERS=${PHP_CLI_SERVER_WORKERS:-8} php artisan serve --no-reload --host 0.0.0.0 --port $PORT"
